<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booth Ready | Order Success</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070403;--panel:#140b08;--cream:#e2d0a8;--muted:rgba(226,208,168,.72);--orange:#f15a2a;--line:rgba(241,90,42,.36);--green:#5bd37b;--red:#ff6961}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 25% 10%,rgba(241,90,42,.2),transparent 34%),#070403;color:var(--cream);font-family:Inter,system-ui,sans-serif}
    .card{width:min(720px,100%);border:1px solid var(--line);background:linear-gradient(180deg,rgba(32,16,11,.96),rgba(10,5,4,.98));border-radius:22px;padding:30px;box-shadow:0 30px 90px rgba(0,0,0,.56)}
    .kicker{font-family:Anton,Impact,sans-serif;letter-spacing:.18em;color:var(--orange);font-size:14px;margin-bottom:8px}
    h1{font-family:Anton,Impact,sans-serif;text-transform:uppercase;font-size:clamp(44px,8vw,82px);line-height:.9;margin:0 0 12px}
    p{color:var(--muted);line-height:1.55;font-weight:650}
    .summary{margin:22px 0;padding:18px;border:1px solid rgba(226,208,168,.14);border-radius:16px;background:rgba(0,0,0,.25)}
    .row{display:flex;justify-content:space-between;gap:16px;padding:8px 0;border-bottom:1px solid rgba(226,208,168,.08)}
    .row:last-child{border-bottom:0}
    .row span{color:var(--muted)}
    .row strong{text-align:right}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
    a.button,button{border:0;border-radius:12px;padding:14px 18px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:1000;text-decoration:none;cursor:pointer}
    .primary{background:var(--orange);color:#1b0904;box-shadow:0 10px 30px rgba(241,90,42,.24)}
    .secondary{background:rgba(226,208,168,.10);border:1px solid rgba(226,208,168,.22);color:var(--cream)}
    .status{margin-top:16px;font-weight:800;color:var(--muted)}
    .ok{color:var(--green)}.bad{color:var(--red)}
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">BOOTH READY</div>
    <h1>Order Confirmed</h1>
    <p id="message">Confirming payment and preparing your download...</p>

    <section class="summary" id="summary" hidden>
      <div class="row"><span>Beat</span><strong id="beatName">-</strong></div>
      <div class="row"><span>License</span><strong id="licenseName">-</strong></div>
      <div class="row"><span>Amount</span><strong id="amount">-</strong></div>
      <div class="row"><span>Status</span><strong id="paymentStatus">-</strong></div>
      <div class="row"><span>Email delivery</span><strong id="emailStatus">-</strong></div>
    </section>

    <div class="actions">
      <a class="button primary" id="downloadButton" href="#" hidden>Download Beat</a>
      <a class="button secondary" id="orderButton" href="#" hidden>Open Order Page</a>
      <a class="button secondary" href="/">Back to Store</a>
    </div>

    <div class="status" id="status"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    const money = (cents) => Number.isFinite(Number(cents)) ? "$" + (Number(cents) / 100).toFixed(2) : "-";

    async function loadStatus() {
      const status = document.getElementById("status");
      const message = document.getElementById("message");

      if (!sessionId) {
        status.className = "status bad";
        status.textContent = "Missing session ID.";
        return;
      }

      try {
        const response = await fetch(`/api/session-status?session_id=${encodeURIComponent(sessionId)}`, { cache: "no-store" });
        const data = await response.json();

        if (!response.ok) throw new Error(data.error || "Unable to confirm order.");

        document.getElementById("summary").hidden = false;
        document.getElementById("beatName").textContent = data.beatName || "-";
        document.getElementById("licenseName").textContent = data.licenseName || "-";
        document.getElementById("amount").textContent = money(data.amountTotal);
        document.getElementById("paymentStatus").textContent = data.paymentStatus || "-";

        if (data.emailSentAt) {
          document.getElementById("emailStatus").textContent = "Sent";
        } else if (data.emailError) {
          document.getElementById("emailStatus").textContent = "Pending / not configured";
        } else {
          document.getElementById("emailStatus").textContent = "Processing";
        }

        if (data.paymentStatus === "paid" && data.downloadUrl) {
          message.textContent = "Your payment is confirmed. Your download is ready.";
          status.className = "status ok";
          status.textContent = "Keep this page open until your download is complete.";
          const download = document.getElementById("downloadButton");
          download.hidden = false;
          download.href = data.downloadUrl;

          const order = document.getElementById("orderButton");
          order.hidden = false;
          order.href = data.orderUrl || `/order.html?session_id=${encodeURIComponent(sessionId)}`;
        } else {
          message.textContent = "Payment is not confirmed yet. Refresh this page in a few seconds.";
          status.className = "status";
          status.textContent = "If payment completed, Stripe may still be updating.";
        }
      } catch (error) {
        status.className = "status bad";
        status.textContent = error.message || "Unable to load order.";
      }
    }

    loadStatus();
  </script>
</body>
</html>
