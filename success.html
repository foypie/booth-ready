<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 720px;
      background: #151515;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.1rem;
    }

    .lead {
      color: #c2c2c2;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    .summary {
      margin: 24px 0;
      padding: 18px;
      border-radius: 16px;
      background: #101010;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 9px 0;
      color: #d8d8d8;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .row:last-child {
      border-bottom: none;
    }

    .download-panel {
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      background: #101010;
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .download-panel.show {
      display: block;
    }

    .download-panel h2 {
      margin: 0 0 10px;
      font-size: 1.35rem;
    }

    .download-panel p {
      margin: 0 0 16px;
      color: #c2c2c2;
      line-height: 1.6;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: #c79a2b;
      color: #111;
      font-weight: 700;
      text-decoration: none;
    }

    a.secondary {
      background: transparent;
      color: #e5e5e5;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .status {
      color: #a9a9a9;
      font-size: 0.95rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Payment Successful</h1>
    <p class="lead">
      Your payment was received. Your order details are below, and your download is unlocked immediately on this page.
    </p>

    <div class="summary" id="summary">Loading order summary...</div>

    <div class="download-panel" id="downloadPanel">
      <h2>Your beat is ready</h2>
      <p>
        Click the button below to download your purchased beat file now.
      </p>
      <a class="button" id="downloadButton" href="#" download>Download your beat</a>
      <div class="status" id="downloadStatus"></div>
    </div>

    <div class="actions">
      <a class="secondary" id="orderLink" href="/order.html">Open Order Page</a>
      <a class="secondary" href="/">Return to Catalog</a>
    </div>
  </div>

  <script>
    async function loadSummary() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const summary = document.getElementById("summary");
      const orderLink = document.getElementById("orderLink");
      const downloadPanel = document.getElementById("downloadPanel");
      const downloadButton = document.getElementById("downloadButton");
      const downloadStatus = document.getElementById("downloadStatus");

      if (!sessionId) {
        summary.textContent = "No session id found in the URL.";
        return;
      }

      orderLink.href = `/order.html?session_id=${encodeURIComponent(sessionId)}`;

      try {
        const response = await fetch(`/api/session-status?session_id=${encodeURIComponent(sessionId)}`);
        const data = await response.json();

        if (!response.ok) {
          summary.textContent = data.error || "Could not load order summary.";
          return;
        }

        const amount = data.amountTotal ? `$${(data.amountTotal / 100).toFixed(2)}` : "-";

        summary.innerHTML = `
          <div class="row"><span>Beat</span><strong>${data.beatName || "-"}</strong></div>
          <div class="row"><span>License</span><strong>${data.licenseName || "-"}</strong></div>
          <div class="row"><span>Amount</span><strong>${amount}</strong></div>
          <div class="row"><span>Email</span><strong>${data.customerEmail || "-"}</strong></div>
          <div class="row"><span>Status</span><strong>${data.paymentStatus || "-"}</strong></div>
        `;

        if (data.paymentStatus === "paid" && data.beatFile) {
          downloadButton.href = `/audio/${encodeURIComponent(data.beatFile)}`;
          downloadButton.setAttribute("download", data.beatFile);
          downloadPanel.classList.add("show");
          downloadStatus.textContent = "If the download does not start automatically, use the button above.";
        } else {
          downloadStatus.textContent = "Payment has not been confirmed yet.";
        }
      } catch (error) {
        summary.textContent = "Unable to load order summary.";
      }
    }

    loadSummary();
  </script>
</body>
</html>
