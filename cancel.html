<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Canceled</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 600px;
      background: #151515;
      padding: 40px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      background: #c79a2b;
      color: #111;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Checkout Canceled</h1>
    <p>Your payment was not completed. You can return to the catalog and try again whenever you’re ready.</p>
    <a href="/">Return to Catalog</a>
  </div>
</body>
</html>
